name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build (Release)
        # Builds Xenopairings.Tests, which transitively builds the main app via project reference.
        run: dotnet build tests/Xenopairings.Tests/Xenopairings.Tests.csproj -c Release

      - name: Test (Release)
        # No --no-build: avoids the known .NET 10 + xunit.runner.visualstudio 3.x
        # compatibility issue where vstest gets handed the .dll argument it rejects.
        run: dotnet test tests/Xenopairings.Tests/Xenopairings.Tests.csproj -c Release
