# fly.toml app configuration file for xenopairings

app = 'xenopairings'
primary_region = 'arn'

[build]

[env]
  DATA_DIR = "/data"
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[mounts]
  source = "xenopairings_data"
  destination = "/data"
